name: Semgrep Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Install Semgrep natively via Python pip instead of a Docker action
      - name: Install Semgrep
        run: pip install semgrep

      # 2. Setup standard Reviewdog binary on host runner
      - name: Setup Reviewdog
        uses: reviewdog/action-setup@v1

      # 3. Run Semgrep and stream JSON results straight to Reviewdog
      - name: Run Scan and Post Comments
        env:
          REVIEWDOG_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use standard open-source rules; bypass docker pull networks
          semgrep ci --config=p/default --json > semgrep-results.json || true
          cat semgrep-results.json | reviewdog -f=semgrep -reporter=github-pr-review -level=warning
