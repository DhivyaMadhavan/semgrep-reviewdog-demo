name: Semgrep Reviewdog

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Install Reviewdog
        uses: reviewdog/action-setup@v1

      - name: Run Semgrep and Post PR Comments
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semgrep scan \
            --config=auto \
            --json \
            . > semgrep.json

          cat semgrep.json | reviewdog \
            -f=semgrep \
            -name="semgrep" \
            -reporter=github-pr-review \
            -level=warning \
            -fail-on-error=false
