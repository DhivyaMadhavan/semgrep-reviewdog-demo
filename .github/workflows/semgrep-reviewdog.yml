name: Semgrep Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Fix: Use the valid, community-maintained Semgrep action for Reviewdog
      - name: Run Semgrep with Reviewdog
        uses: g-wilson/action-semgrep@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          fail_on_error: false
